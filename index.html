const RED_FLAGS = [
  { pattern: /0-?3\s*ay|yenidoğan|newborn/i, msg: "3 aydan küçük bebekte ateş acil değerlendirme gerektirir." },
  { pattern: /havale|konvülsiyon|titreme/i, msg: "Havale acil tıbbi müdahale gerektirir." },
  { pattern: /morar|siyanoz|mavileş/i, msg: "Morarma acil belirtidir." },
  { pattern: /nefes\s*darl|zor\s*nefes|nefes\s*alamıyor/i, msg: "Nefes darlığı acil değerlendirme gerektirir." },
  { pattern: /bilinç\s*bulanık|bayıl|uyandıramıyor/i, msg: "Bilinç değişikliği acil belirtidir." },
  { pattern: /ense\s*sertliği|boyun\s*sertliği/i, msg: "Ense sertliği acil belirtidir." },
  { pattern: /sürekli\s*kus|durmadan\s*kus/i, msg: "Sürekli kusma ile birlikte sıvı alamama acil değerlendirme gerektirir." },
  { pattern: /sıvı\s*alamıyor|su\s*içemiyor/i, msg: "Sıvı alamama acil değerlendirme gerektirir." },
  { pattern: /idrar\s*yok|çiş\s*yapmıyor/i, msg: "İdrar azalması veya yokluğu acil değerlendirme gerektirir." },
  { pattern: /kanlı\s*dışkı|kanlı\s*kaka|kanlı\s*kusma/i, msg: "Kanlı dışkı veya kusma acil değerlendirme gerektirir." },
  { pattern: /döküntü.{0,30}ateş|ateş.{0,30}döküntü/i, msg: "Ateşle birlikte döküntü acil değerlendirme gerektirebilir." },
];

function checkRedFlags(text) {
  const found = [];
  for (const rf of RED_FLAGS) {
    if (rf.pattern.test(text)) found.push(rf.msg);
  }
  return found;
}

const MEDICAL_DISCLAIMER = "⚕️ Bu değerlendirme teşhis değildir ve doktor muayenesinin yerine geçmez. Çocuğunuzun genel durumu bozulursa veya endişelenirseniz doktorunuza başvurun.";

// AI MOCK ENGINE (Blueprint §6.1, §6.2)
// ============================================================
async function askAI(question, childData, events) {
  await new Promise(r => setTimeout(r, 1400 + Math.random()*800));

  // Red flag check on question
  const flags = checkRedFlags(question);
  if (flags.length > 0) {
    return {
      text: `⚠️ **ACİL DURUM BELİRTİSİ TESPİT EDİLDİ**\n\n${flags.join("\n")}\n\n**Lütfen hemen 112'yi arayın veya en yakın acil servise gidin.**\n\n${childData.name}'in bilgilerini (kan grubu: ${childData.bloodType}, alerjiler: ${childData.allergies.join(", ")}) sağlık personeline bildirin.\n\n${MEDICAL_DISCLAIMER}`,
      flags: ["EMERGENCY"],
    };
  }

  // Forbidden patterns check
  const q = question.toLowerCase();
  if (/kaç\s*ml|kaç\s*mg|doz\s*ne|ne\s*kadar\s*ver/i.test(question)) {
    return {
      text: `İlaç dozu belirlemek Nuna'nın yapabileceği bir işlem değildir.\n\nDoktorunuzun verdiği doz bilgisini ilaç kaydı bölümüne ekleyebilir ve hatırlatma kurabilirsiniz.\n\n${MEDICAL_DISCLAIMER}`,
      flags: [],
    };
  }
  if (/antibiyotik|penisilin|amoksisilin/i.test(question)) {
    return {
      text: `Antibiyotik kullanımı mutlaka doktor değerlendirmesi ve reçetesi gerektirmektedir. Nuna antibiyotik öneremez.\n\nDoktorunuzla görüşün.\n\n${MEDICAL_DISCLAIMER}`,
      flags: [],
    };
  }

  const childAge = Math.floor((new Date() - new Date(childData.birthDate)) / (365.25*24*3600*1000) * 12);

  if (q.includes("ateş") || q.includes("ates")) {
    const match = question.match(/(\d+[\.,]\d+|\d+)\s*(?:derece|°)/);
    const temp = match ? parseFloat(match[1].replace(",",".")) : null;
    let urgency = "";
    if (temp && temp >= 39) urgency = "\n\n⚠️ **39°C ve üzeri ateş:** Lütfen doktorunuzla iletişime geçin.";
    if (temp && temp >= 40) urgency = "\n\n🚨 **40°C ve üzeri ateş:** Acil servise başvurun veya 112'yi arayın.";
    return {
      text: `${childData.name}'in ateş kayıtlarına baktım.${urgency}\n\n**${childAge} aylık çocukta ateş takibi:**\n• 37.5°C altı: Normal\n• 37.5–38°C: Hafif yükselme, takip\n• 38–39°C: Ateş, bol sıvı, doktor bilgisi\n• 39°C üzeri: Doktora danışın\n\n**Şu an için öneriler:**\n• Bol sıvı alımını sağlayın\n• Giysileri hafifletin\n• 30 dakikada bir ölçüm yapın\n• Doktorun önerdiği ilaç varsa kayıtlı doktor talimatını kontrol edin\n\n**Ne zaman doktora veya 112'ye?**\n→ Ateş 39°C üzeri çıkarsa\n→ 3 günden uzun sürerse\n→ Döküntü, nefes darlığı, bilinç değişikliği eşlik ederse\n→ "Normal değil" hissediyorsanız\n\n${MEDICAL_DISCLAIMER}`,
      flags: temp && temp >= 39 ? ["HIGH_FEVER"] : [],
    };
  }

  if (q.includes("uyku") || q.includes("uyumuyor")) {
    return {
      text: `${childData.name}'in uyku kayıtlarına baktım. ${childAge} aylık çocuklar için:\n• Gece uykusu: 10-12 saat\n• Gündüz uykusu: 1-2 saat (toplam)\n\n**Son kayıtlara göre:** Gece uykusu 20:30–06:45 kayıtlı — bu yaşa uygun.\n\n**Uyku rutini önerileri:**\n• Her gece aynı saatte başlatın (±15 dk)\n• Banyo → kitap → uyku rutini oluşturun\n• Oda sıcaklığı 18-20°C, karanlık\n• Uyku öncesi 1 saat ekran yok\n\n${MEDICAL_DISCLAIMER}`,
      flags: [],
    };
  }

  if (q.includes("beslenme") || q.includes("yemiyor") || q.includes("iştah")) {
    return {
      text: `${childData.name}'in beslenme kayıtlarına baktım. ${childAge} aylık için:\n\n**Günlük beslenme rehberi:**\n• 3 ana öğün + 2 ara öğün\n• 500ml tam yağlı süt/süt ürünü\n• Her öğünde protein (et, yumurta, baklagil)\n• Renkli sebze ve meyve\n• Yeterli demir kaynağı\n\n**İştah azlığında dikkat:**\n→ 5 günden uzun süren iştahsızlık\n→ Kilo kaybı veya durağanlaşma\n→ Genel durumda değişiklik\n\nBunlar varsa doktorunuza danışın.\n\n${MEDICAL_DISCLAIMER}`,
      flags: [],
    };
  }

  if (q.includes("aşı") || q.includes("asi")) {
    return {
      text: `${childData.name}'in aşı takvimine baktım.\n\n✅ **Tamamlanan:** Hepatit B, BCG, 6'lı Karma (2 doz)\n⏳ **Bekleyen:** KKK aşısı (12. ayda planlanmış)\n\n**KKK hakkında genel bilgi:**\nGenellikle 12-15. ayda yapılır. Sonrası 7-14. günlerde hafif ateş ve döküntü görülebilir — bu normal bir bağışıklık yanıtıdır.\n\n**Doktorunuza sormayı unutmayın:**\n• KKK için uygun randevu zamanı\n• Aşı sonrası takip önerileri\n\n${MEDICAL_DISCLAIMER}`,
      flags: [],
    };
  }

  if (q.includes("gelişim") || q.includes("büyüme")) {
    return {
      text: `${childData.name}'in gelişim kaydına baktım. ${childAge} aylık, ${childData.weight} kg, ${childData.height} cm.\n\n✅ **Tamamlanan kilometre taşları:** Emekleme dahil 4 taş tamamlanmış.\n⏳ **Sıradaki beklenen:** İlk adımlar (9-15. ay normal aralığı)\n\n**Bugünkü gelişim aktivitesi:**\n🧱 **Kule Yapma Oyunu** (10 dk)\nBlokları üst üste koyun, yıkmasını izleyin, birlikte koyun.\n→ El-göz koordinasyonu\n→ Neden-sonuç ilişkisi\n→ İnce motor becerisi\n\nHer çocuğun gelişimi farklı tempoda ilerler.\n\n${MEDICAL_DISCLAIMER}`,
      flags: [],
    };
  }

  if (q.includes("doktor") && (q.includes("özet") || q.includes("randevu") || q.includes("hazırlık"))) {
    return {
      text: `**${childData.name} için Doktor Randevusu Özeti**\n\n👶 **Hasta:** ${childData.name} · ${childAge} ay · ${childData.weight} kg · ${childData.height} cm\n🩸 **Kan grubu:** ${childData.bloodType}\n⚠️ **Alerjiler:** ${childData.allergies.join(", ") || "Yok"}\n\n**Son belirtiler:**\nSon kayıtlarda öksürük + burun akıntısı (Kasım 2024 doktor ziyareti)\n\n**Güncel ilaçlar:**\nD Vitamini 400 IU — günde 1\n\n**Bekleyen aşı:**\nKKK (12. ay)\n\n**Doktora sormayı unutmayın:**\n• KKK aşısı için en uygun zaman\n• Boy/kilo büyüme değerlendirmesi\n• Diş çıkarma süreci\n\n${MEDICAL_DISCLAIMER}`,
      flags: [],
    };
  }

  return {
    text: `${childData.name}'in kayıtlarına baktım (${childAge} aylık, ${childData.weight} kg).\n\nBu konuda size nasıl yardımcı olabilirim?\n\n• Ateş takibi ve analizi\n• Uyku düzeni değerlendirmesi\n• Beslenme önerileri\n• Aşı takvimi\n• Gelişim aktiviteleri\n• Doktor randevusu özeti\n\nDaha spesifik bir soru sorabilirsiniz.\n\n${MEDICAL_DISCLAIMER}`,
    flags: [],
  };
}

function getAge(birthDate) {
  const now = new Date(), birth = new Date(birthDate);
  const months = (now.getFullYear()-birth.getFullYear())*12+(now.getMonth()-birth.getMonth());
  if (months < 24) return `${months} aylık`;
  const y = Math.floor(months/12), r = months%12;
  return r > 0 ? `${y} yaş ${r} ay` : `${y} yaş`;
}
function formatTime(iso) { return new Date(iso).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}); }

function Card({children,style,onClick}) {
  return <div onClick={onClick} style={{background:T.white,borderRadius:16,padding:20,boxShadow:`0 2px 12px ${T.shadow}`,cursor:onClick?"pointer":"default",...style}}>{children}</div>;
}
function Tag({color,bg,children}) {
  return <span style={{background:bg||T.beige,color:color||T.textM,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600}}>{children}</span>;
}
function Btn({children,onClick,variant="primary",small,style,disabled}) {
  const s={primary:{background:T.sage,color:T.white},secondary:{background:T.beige,color:T.text},danger:{background:T.redXL,color:T.red},ghost:{background:"transparent",color:T.sage,border:`1.5px solid ${T.sage}`}};
  return <button onClick={onClick} disabled={disabled} style={{...s[variant],border:"none",borderRadius:12,padding:small?"8px 16px":"12px 22px",fontSize:small?13:15,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.6:1,fontFamily:"inherit",...style}}>{children}</button>;
}
function Input({label,value,onChange,placeholder,type="text",multiline,required}) {
  const base={width:"100%",border:`1.5px solid ${T.beigeD}`,borderRadius:10,padding:"10px 14px",fontSize:15,fontFamily:"inherit",background:T.cream,color:T.text,outline:"none",boxSizing:"border-box",resize:multiline?"vertical":undefined};
  return <div style={{marginBottom:16}}>
    {label&&<div style={{fontSize:13,fontWeight:600,color:T.textM,marginBottom:6}}>{label}{required&&<span style={{color:T.red}}> *</span>}</div>}
    {multiline?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={base}/>:<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={base}/>}
  </div>;
}
function Select({label,value,onChange,options}) {
  return <div style={{marginBottom:16}}>
    {label&&<div style={{fontSize:13,fontWeight:600,color:T.textM,marginBottom:6}}>{label}</div>}
    <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",border:`1.5px solid ${T.beigeD}`,borderRadius:10,padding:"10px 14px",fontSize:15,fontFamily:"inherit",background:T.cream,color:T.text,outline:"none"}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>;
}
function Modal({open,onClose,title,children}) {
  if (!open) return null;
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.white,borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:700,color:T.text}}>{title}</div>
        <button onClick={onClose} style={{background:T.beige,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:16,color:T.textM}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

function AddEventModal({open,onClose,onSave,defaultType}) {
  const [type,setType]=useState(defaultType||"note");
  const [title,setTitle]=useState("");
  const [value,setValue]=useState("");
  const [note,setNote]=useState("");
  const [naturalText,setNaturalText]=useState("");
  const [mode,setMode]=useState("quick");
  const [parsing,setParsing]=useState(false);

  useEffect(()=>{if(open){setType(defaultType||"note");setTitle("");setValue("");setNote("");setNaturalText("");}},[open,defaultType]);

  const typeOptions=Object.entries(eventTypeConfig).map(([k,v])=>({value:k,label:`${v.icon} ${v.label}`}));

  const handleNaturalParse=async()=>{
    if(!naturalText.trim())return;
    setParsing(true);
    await new Promise(r=>setTimeout(r,700));
    const t=naturalText.toLowerCase();
    if(t.includes("ateş")||t.includes("derece")){setType("fever");setTitle("Ateş ölçümü");const m=t.match(/(\d+[\.,]\d+|\d+)\s*derece/);setValue(m?m[1].replace(",",".")+"°C":"");}
    else if(t.includes("uyku")||t.includes("uyudu")||t.includes("uyandı")){setType("sleep");setTitle("Uyku kaydı");}
    else if(t.includes("ilaç")||t.includes("şurup")){setType("med");setTitle("İlaç verildi");}
    else if(t.includes("mama")||t.includes("yedi")||t.includes("emzir")){setType("feed");setTitle("Beslenme");}
    else if(t.includes("bez")||t.includes("kaka")||t.includes("çiş")){setType("diaper");setTitle("Bez değişimi");}
    else{setType("note");setTitle("Günlük not");}
    setNote(naturalText);
    setParsing(false);
    setMode("quick");
  };

  // Red flag check on save
  const handleSave=()=>{
    const cfg=eventTypeConfig[type];
    const flags=checkRedFlags(note+value);
    if(flags.length>0&&!window.confirm(`⚠️ ACİL BELİRTİ TESPİT EDİLDİ:\n\n${flags[0]}\n\nYine de kaydetmek istiyor musunuz?`))return;
    onSave({type,title:title||cfg.label,value,note,dateTime:new Date().toISOString()});
    onClose();
  };

  return <Modal open={open} onClose={onClose} title="Kayıt Ekle">
    <div style={{display:"flex",gap:8,marginBottom:20}}>
      {["quick","natural"].map(m=><Btn key={m} variant={mode===m?"primary":"secondary"} small onClick={()=>setMode(m)} style={{flex:1}}>
        {m==="quick"?"📋 Hızlı":"💬 Doğal Dil"}
      </Btn>)}
    </div>
    {mode==="natural"?<div>
      <Input label="Doğal dille anlat" value={naturalText} onChange={setNaturalText} multiline placeholder={'Örn: "38 derece ateşi var, 14.30\'da ölçtüm"\n"Sabah 7\'de uyandı, kahvaltıda yoğurt yedi"'}/>
      <Btn onClick={handleNaturalParse} disabled={parsing||!naturalText.trim()} style={{width:"100%"}}>{parsing?"Analiz ediliyor...":"Kayda Dönüştür →"}</Btn>
    </div>:<div>
      <Select label="Kayıt türü" value={type} onChange={setType} options={typeOptions}/>
      {type==="med"&&<MedDisclaimer/>}
      <Input label="Başlık" value={title} onChange={setTitle} placeholder={eventTypeConfig[type]?.label||"Başlık"}/>
      <Input label="Değer" value={value} onChange={setValue} placeholder={type==="fever"?"38.5°C":type==="sleep"?"20:30 – 07:00":"Detay"}/>
      <Input label="Not" value={note} onChange={setNote} multiline placeholder="Ek not..."/>
      <Btn onClick={handleSave} style={{width:"100%"}}>Kaydet</Btn>
    </div>}
  </Modal>;
}

function AIScreen({child,events,meds,vaccines}) {
  const [messages,setMessages]=useState([{role:"assistant",text:`Merhaba! Ben Nuna AI, ${child.name}'in kişisel asistanıyım.\n\n${child.name}'in kayıtlarına erişimim var — uyku, beslenme, ateş, ilaç, aşı ve gelişim verilerine göre bağlamsal destek sunabilirim.\n\nNe sormak istersiniz?\n\n${MEDICAL_DISCLAIMER}`,flags:[]}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const quickPrompts=["Son ateş kayıtlarını analiz et","Uyku düzeni nasıl?","Doktor randevusu özeti yap","Gelişim aktivitesi öner","Aşı takvimine bak"];

  const send=async(q)=>{
    const question=q||input.trim();
    if(!question||loading)return;
    setInput("");
    setMessages(m=>[...m,{role:"user",text:question}]);
    setLoading(true);
    const res=await askAI(question,child,events);
    setLoading(false);
    setMessages(m=>[...m,{role:"assistant",text:res.text,flags:res.flags}]);
  };

  const renderText=(text,isUser)=>{
    return text.split("\n").map((line,j)=>{
      if(line.startsWith("**")&&line.endsWith("**"))return <div key={j} style={{fontWeight:700,color:isUser?T.white:T.text,marginTop:j>0?8:0}}>{line.slice(2,-2)}</div>;
      if(line.startsWith("→ "))return <div key={j} style={{paddingLeft:12,borderLeft:`3px solid ${isUser?"rgba(255,255,255,0.4)":T.peachL}`,marginLeft:4,marginTop:4,color:isUser?"rgba(255,255,255,0.9)":T.textM}}>{line.slice(2)}</div>;
      if(line.startsWith("• "))return <div key={j} style={{paddingLeft:10,marginTop:2}}>• {line.slice(2)}</div>;
      if(line.startsWith("✅")||line.startsWith("⏳"))return <div key={j} style={{marginTop:4}}>{line}</div>;
      return <span key={j}>{line}{j<text.split("\n").length-1?<br/>:""}</span>;
    });
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100vh",paddingBottom:80}}>
    <div style={{padding:"48px 20px 12px",background:`linear-gradient(135deg,${T.lilaXL},${T.blueXL})`,borderBottom:`1px solid ${T.beigeD}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{fontSize:32}}>✨</div>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:T.text}}>Nuna AI Asistan</div>
          <div style={{fontSize:13,color:T.textM}}>{child.name}'in verisine dayalı karar desteği</div>
        </div>
      </div>
      <AIDisclaimer/>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 16px 0"}}>
      {messages.map((m,i)=><div key={i} style={{marginBottom:16,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"88%",background:m.role==="user"?T.sage:m.flags?.includes("EMERGENCY")?T.redXL:T.white,color:m.role==="user"?T.white:T.text,borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"12px 16px",boxShadow:`0 2px 8px ${T.shadow}`,fontSize:14,lineHeight:1.7,border:m.flags?.includes("EMERGENCY")?`1.5px solid ${T.redL}`:"none",whiteSpace:"pre-wrap"}}>
          {m.flags?.includes("EMERGENCY")&&<div style={{fontWeight:700,color:T.red,marginBottom:8,fontSize:15}}>🚨 ACİL DURUM</div>}
          {renderText(m.text,m.role==="user")}
        </div>
      </div>)}
      {loading&&<div style={{display:"flex",gap:6,padding:"12px 0",marginBottom:16}}>
        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:T.lila,animation:"bounce 1s infinite",animationDelay:`${i*0.2}s`}}/>)}
      </div>}
      <div ref={bottomRef}/>
    </div>
    {messages.length<2&&<div style={{padding:"0 16px",overflowX:"auto"}}>
      <div style={{display:"flex",gap:8,paddingBottom:8}}>
        {quickPrompts.map(p=><button key={p} onClick={()=>send(p)} style={{background:T.white,border:`1.5px solid ${T.beigeD}`,borderRadius:20,padding:"8px 14px",fontSize:12,color:T.text,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",fontWeight:500}}>{p}</button>)}
      </div>
    </div>}
    <div style={{padding:"12px 16px",background:T.white,borderTop:`1px solid ${T.beige}`,display:"flex",gap:10}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={`${child.name} hakkında soru sor...`} style={{flex:1,border:`1.5px solid ${T.beigeD}`,borderRadius:24,padding:"10px 16px",fontSize:14,fontFamily:"inherit",background:T.cream,color:T.text,outline:"none"}}/>
      <button onClick={()=>send()} disabled={!input.trim()||loading} style={{width:44,height:44,borderRadius:"50%",background:T.sage,border:"none",cursor:"pointer",fontSize:18,color:T.white,opacity:!input.trim()||loading?0.5:1}}>→</button>
    </div>
  </div>;
}

function ProfileScreen({child,events,onNav}) {

  // Home safety checklist (Blueprint §7.13)
  const safetyItems=[
    {cat:"Elektrik",items:["Prizler korunuyor","Uzatma kabloları erişilemez"]},
    {cat:"Mobilya",items:["Dolaplar duvara sabitli","Masa köşeleri korumalı","TV sabitli"]},
    {cat:"Kimyasallar",items:["Temizlik ürünleri kilitli","İlaçlar erişilemez yerde","Bitki/gübre ulaşılamaz"]},
    {cat:"Düşme riski",items:["Balkon ağı var","Merdiven kapısı var","Pencere kilitleri var"]},
    {cat:"Boğulma",items:["Küçük parçalar erişilemez","Plastik torbalar gizli","Oyuncaklar yaşa uygun"]},

          {label:"Boy",value:`${child.height} cm`},
          {label:"Alerjiler",value:child.allergies.join(", ")||"Yok"},
          {label:"Kronik Hastalık",value:child.chronicConditions.join(", ")||"Yok"},
          {label:"Doktor",value:child.doctorInfo.name},
          {label:"Doktor Tel",value:child.doctorInfo.phone},

          <span style={{color:T.text,fontWeight:600,fontSize:14}}>{item.value}</span>

        <div style={{marginTop:20}}>
          <div style={{fontWeight:700,color:T.text,marginBottom:12}}>⚙️ Veri Yönetimi</div>
          <div style={{background:T.blueXL,borderRadius:12,padding:14,fontSize:13,color:T.textM,lineHeight:1.7,border:`1px solid ${T.blueL}`}}>
            <strong style={{color:T.text}}>KVKK Haklarınız</strong><br/>

      <Input label='Onaylamak için "SİL" yazın' value={deleteConfirm} onChange={setDeleteConfirm} placeholder="SİL"/>
      <Btn variant="danger" disabled={deleteConfirm!=="SİL"} style={{width:"100%"}}>Hesabı Kalıcı Olarak Sil</Btn>
    </Modal>
  </div>;
}

    ReactDOM.createRoot(document.getElementById('root')).render(
